name: ✨ 功能建议 / Feature request
description: 建议一个新功能或对现有功能的改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题？ / 动机
      description: 先说说你遇到的困扰或场景，而不是直接给方案。例如「在 … 时很难 …」。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的功能 / 解决方案
      description: 你希望网站怎么做？尽量描述具体的交互或效果。
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 相关区域
      options:
        - 浏览 / 坐席图 / Lightbox
        - 上传照片
        - 搜索 / 场馆列表
        - 想看的场馆（暂存区）
        - 后台 / admin
        - 其他
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的备选方案
      description: 有没有想过其他做法？为什么觉得上面的方案更好？
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: 补充信息
      description: 截图、参考链接、相似产品的做法等都可以放这里。
    validations:
      required: false
