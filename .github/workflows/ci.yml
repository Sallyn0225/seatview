name: CI

# Typecheck + build only. Deployment is done manually by the maintainer
# (`npm run deploy` → Cloudflare), so there is intentionally no CD here.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
